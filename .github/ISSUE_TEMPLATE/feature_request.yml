name: 🚀 Feature Request
description: Suggest a new section, component, or improvement
title: 'feat: '
labels: ['enhancement']
body:
    - type: markdown
      attributes:
          value: Thanks for the suggestion! Please fill out the details below.

    - type: textarea
      id: description
      attributes:
          label: Description
          description: What do you want to add or improve?
      validations:
          required: true

    - type: textarea
      id: motivation
      attributes:
          label: Motivation
          description: Why would this be valuable?
      validations:
          required: true

    - type: textarea
      id: implementation
      attributes:
          label: Possible Implementation
          description: Any ideas on how to implement this?
