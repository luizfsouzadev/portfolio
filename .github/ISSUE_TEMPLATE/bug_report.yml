name: 🐛 Bug Report
description: Report a visual issue, broken link, or unexpected behavior
title: 'fix: '
labels: ['bug']
body:
    - type: textarea
      id: description
      attributes:
          label: Describe the bug
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          placeholder: |
              1. Go to '...'
              2. Click on '...'
              3. See error
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: true

    - type: dropdown
      id: browser
      attributes:
          label: Browser
          options: [Chrome, Firefox, Safari, Edge, Other]

    - type: input
      id: device
      attributes:
          label: Device / OS
          placeholder: 'e.g. Windows 11 / Chrome 124'
